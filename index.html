<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
      <link rel="stylesheet" href="styles.css">
      <title>Product Preview</title>
</head>
<body>
      <div class="wrapper">

            <div class="container">
                  <header>
                        <img src="assets/images/image-product-mobile.jpg" alt="product">
                        <p>PERFUME</p>
                        <h1>Gabrielle Essence Eau De Parfum</h1>
                  </header>

                  <main>
                        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
                  </main>

                  <section>
                        <div class="price">
                              <p class="new-price">$149.99</p>
                              <p class="old-price"><del>$169.99</del></p>
                        </div>
                        
                        <a class="cart-link" href="https://www.jumia.com.ng/cart">
                        <div class="cart-container">
                              <img src="assets/images/icon-cart.svg" alt="Cart">
                              <p>Add to Cart</p>
                        </div>
                        </a>
                  </section>
            </div>

            <footer>
                  <div class="container-footer">
                        <p>Challenge by <a href="https://www.frontendmentor.io/home">Frontend Mentor</a></p>
                        <p>Coded by <a href="https://github.com/yung-dy?tab=repositories">Ekpeakhena Destiny</a></p>
                  </div>
            </footer>
      </div>
</body>
</html>
